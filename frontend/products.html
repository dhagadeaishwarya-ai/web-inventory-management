<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products | Inventory System</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="d-flex min-vh-100">
      <!-- Sidebar -->
      <aside class="bg-dark text-white p-3" style="width: 240px;">
        <h2 class="h4 mb-4">Inventory</h2>

        <nav class="nav flex-column">
          <a href="dashboard.html" class="nav-link text-white">Dashboard</a>
          <a href="products.html" class="nav-link text-white">Products</a>
          <a href="add-product.html" class="nav-link text-white">Add Product</a>
          <a href="login.html" class="nav-link text-white logout-link">Logout</a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h1 class="h2">Products</h1>
          <a href="add-product.html" class="btn btn-primary">Add Product</a>
        </div>

        <!-- Search and Filter -->
        <div class="card p-3 mb-4">
          <div class="row g-3">
            <div class="col-md-8">
              <input
                id="searchInput"
                type="text"
                class="form-control"
                placeholder="Search by name or SKU"
              />
            </div>

            <div class="col-md-4">
              <select id="categoryFilter" class="form-select">
                <option value="">All Categories</option>
                <option value="Electronics">Electronics</option>
                 <option value="Stationery">Stationery</option>
                <option value="Furniture">Furniture</option>
            </select>
            </div>
          </div>
        </div>

        <!-- Products Table -->
        <div class="card p-3">
          <div class="table-responsive">
            <table class="table table-striped align-middle">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>SKU</th>
                  <th>Quantity</th>
                  <th>Price</th>
                  <th>Category</th>
                  <th>Supplier</th>
                  <th>Date Added</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody id="productTableBody">

                <tr>
                  <td>Keyboard</td>
                  <td>KB001</td>
                  <td>
                    10
                  </td>
                  <td>Rs. 500</td>
                  <td>Electronics</td>
                  <td>ABC Suppliers</td>
                  <td>2026-05-07</td>
                  <td>
                    <button class="btn btn-sm btn-warning">Edit</button>
                    <button class="btn btn-sm btn-danger">Delete</button>
                  </td>
                </tr>

                <tr>
                  <td>Mouse</td>
                  <td>MS001</td>
                  <td>
                    3
                    <span class="badge text-bg-danger">Low</span>
                  </td>
                  <td>Rs. 300</td>
                  <td>Electronics</td>
                  <td>Digital Hub</td>
                  <td>2026-05-07</td>
                  <td>
                    <button class="btn btn-sm btn-warning">Edit</button>
                    <button class="btn btn-sm btn-danger">Delete</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script src="js/products.js"></script>
    <script src="js/app.js"></script>

  </body>
</html>
