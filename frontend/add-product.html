<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Product | Inventory System</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="d-flex min-vh-100">
      <!-- Sidebar -->
      <aside class="bg-dark text-white p-3" style="width: 240px;">
        <h2 class="h4 mb-4">Inventory</h2>

        <nav class="nav flex-column">
          <a href="dashboard.html" class="nav-link text-white">Dashboard</a>
          <a href="products.html" class="nav-link text-white">Products</a>
          <a href="add-product.html" class="nav-link text-white">Add Product</a>
          <a href="login.html" class="nav-link text-white">Logout</a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h1 class="h2">Add Product</h1>
          <a href="products.html" class="btn btn-secondary">Back</a>
        </div>

        <div class="card p-4">
          <form id="productForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="productName" class="form-label">Product Name</label>
                <input
                  id="productName"
                  type="text"
                  class="form-control"
                  placeholder="Keyboard"
                  required
                />
              </div>

              <div class="col-md-6">
                <label for="sku" class="form-label">SKU/Product ID</label>
                <input
                  id="sku"
                  type="text"
                  class="form-control"
                  placeholder="KB001"
                  required
                />
              </div>

              <div class="col-md-6">
                <label for="quantity" class="form-label">Quantity</label>
                <input
                  id="quantity"
                  type="number"
                  class="form-control"
                  placeholder="10"
                  required
                />
              </div>

              <div class="col-md-6">
                <label for="price" class="form-label">Price</label>
                <input
                  id="price"
                  type="number"
                  class="form-control"
                  placeholder="500"
                  required
                />
              </div>

              <div class="col-md-6">
                <label for="category" class="form-label">Category</label>
                <select id="category" class="form-select" required>
                  <option value="">Select Category</option>
                  <option value="Electronics">Electronics</option>
                  <option value="Stationery">Stationery</option>
                  <option value="Furniture">Furniture</option>
                </select>
              </div>

              <div class="col-md-6">
                <label for="supplier" class="form-label">Supplier</label>
                <input
                  id="supplier"
                  type="text"
                  class="form-control"
                  placeholder="ABC Suppliers"
                  required
                />
              </div>

              <div class="col-md-6">
                <label for="dateAdded" class="form-label">Date Added</label>
                <input
                  id="dateAdded"
                  type="date"
                  class="form-control"
                  required
                />
              </div>
            </div>

            <div class="mt-4">
              <button type="submit" class="btn btn-primary">Save Product</button>
              <button type="reset" class="btn btn-outline-secondary">Clear</button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <script src="js/products.js"></script>
  </body>
</html>
