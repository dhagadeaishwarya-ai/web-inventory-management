<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Inventory System</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="d-flex min-vh-100">
      <!-- Sidebar -->
      <aside class="bg-dark text-white p-3" style="width: 240px;">
        <h2 class="h4 mb-4">Inventory</h2>

        <nav class="nav flex-column">
          <a href="dashboard.html" class="nav-link text-white">Dashboard</a>
          <a href="products.html" class="nav-link text-white">Products</a>
          <a href="add-product.html" class="nav-link text-white">Add Product</a>
          <a href="login.html" class="nav-link text-white">Logout</a>
        </nav>
      </aside>

      <!-- Main Content -->
      <main class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h1 class="h2">Dashboard</h1>
          <a href="add-product.html" class="btn btn-primary">Add Product</a>
        </div>

        <!-- Cards -->
        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <div class="card p-3">
              <p class="text-muted mb-1">Total Products</p>
              <h2 id="totalProducts">0</h2>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card p-3">
              <p class="text-muted mb-1">Low Stock Items</p>
             <h2 id="lowStockItems">0</h2>
            </div>
          </div>

          <div class="col-md-4">
            <div class="card p-3">
              <p class="text-muted mb-1">Inventory Value</p>
              <h2 id="inventoryValue">Rs. 0</h2>
            </div>
          </div>
        </div>

        <!-- Recent Products Table -->
        <div class="card p-3">
          <h2 class="h5 mb-3">Recent Products</h2>

          <div class="table-responsive">
            <table class="table table-striped align-middle">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>SKU</th>
                  <th>Quantity</th>
                  <th>Price</th>
                  <th>Category</th>
                </tr>
              </thead>
              <tbody id="recentProductsBody">
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script src="js/products.js"></script>
  </body>
</html>
